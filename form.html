<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This form website is the better study of the wdd131 course.">


    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-larger.css">

    <script src="scripts/form.js" defer></script>


    <title>Form Page</title>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <div class="cham"> 
            <form method="get" action="review.html">
                <label>Product Name
                    <select id="product" name="product" required>
                        <option value="" disabled selected>Select a Product..</option>
                    </select>
                </label>
                <fieldset>
                    <legend>
                        Overall Rating        
                    </legend>
                    <div class="muha">
                        <label for="star1">
                        <input type="radio" id="star1" name="rating" value="1" required>
                        ⭐</label>

                        <label for="star2">
                        <input type="radio" id="star2" name="rating" value="2" required>
                        ⭐⭐</label>

                        <label for="star3">
                        <input type="radio" id="star3" name="rating" value="3" required>
                        ⭐⭐⭐</label>

                        <label for="star4">
                        <input type="radio" id="star4" name="rating" value="4" required>
                        ⭐⭐⭐⭐</label>

                        <label for="star5">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        ⭐⭐⭐⭐⭐</label>
                    </div>        
                </fieldset>
                <label for="installDate">Date of Installation*</label>
                <input type="date" id="installDate" name="installDate" required>
                
                <fieldset>
                    <legend>
                        Which features did you find useful in the product?
                        (Check all that apply)
                    </legend>
                    <label for="durability"><input type="checkbox" id="durability" name="features" value="Durability">
                    Durability</label>

                    <label for="ease"><input type="checkbox" id="ease" name="features" value="Ease of Use">
                    Ease of Use</label>
 
                    <label for="performance"><input type="checkbox" id="performance" name="features" value="Performance">
                    performance</label>

                    <label for="design"><input type="checkbox" id="design" name="features" value="Design">
                    Design</label>

                </fieldset>

                <label for="review">Written Review</label>
                <textarea id="review" name="review" rows="5"></textarea>

                <label for="username">Your Name</label>
                <input type="text" id="username" name="username">

                <input type="submit" value="Post Review">

            </form>
        </div>    
    </main>
    <footer>
        <p>©<span id="currentyear"></span>👍 Muhammad Noordin ✔ Jinja Uganda</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
